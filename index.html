<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fortune Cookie - Optimized Layout</title>
    <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.18.0/matter.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.11.5/gsap.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #f7f3e9; font-family: 'Permanent Marker', cursive; user-select: none; }
        #ui-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 500; display: flex; flex-direction: column; align-items: center; }
        #title { margin-top: 5vh; font-size: clamp(2rem, 8vw, 3.5rem); color: #333; letter-spacing: 4px; }
        
        /* 调整按钮高度：从 40px 提高到 100px [cite: 21-02-2026] */
        #back-btn {
            position: fixed; bottom: 100px; padding: 12px 35px; background: #5d534a; color: #f7f3e9;
            border: none; cursor: pointer; font-family: 'Permanent Marker'; font-size: 1.2rem;
            display: none; z-index: 510; pointer-events: auto;
        }
        
        #fortune-note {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0);
            width: 440px; max-width: 90vw; min-height: 180px; 
            /* 纸张纤维纹理细节 [cite: 21-02-2026] */
            background: 
                repeating-radial-gradient(#fffef2 0 0.0001%, #fcfaf0 0 0.0002%) 50% 0/2px 2px,
                #fffef2;
            background-blend-mode: multiply;
            filter: contrast(1.05);
            border: 1.5px solid #4e342e;
            box-shadow: 12px 12px 0px rgba(0,0,0,0.05); 
            text-align: left; z-index: 600; 
            display: none; padding: clamp(30px, 8vw, 50px); box-sizing: border-box;
            clip-path: polygon(1% 1%, 99% 2%, 98% 98%, 2% 99%);
            pointer-events: auto;
        }
        
        #fortune-note h2 { font-family: 'Permanent Marker', cursive; font-size: clamp(1.1rem, 4.5vw, 1.4rem); margin: 0 0 20px 0; line-height: 1.4; color: #2e241f; letter-spacing: 0.5px; }
        #fortune-note p { font-family: 'Permanent Marker', cursive; font-size: clamp(0.9rem, 3.5vw, 1rem); color: #5d4037; margin: 0; opacity: 0.8; }
        
        canvas { position: absolute; top: 0; left: 0; z-index: 100; cursor: pointer; transition: filter 0.3s ease; }
    </style>
</head>
<body>
    <div id="ui-layer">
        <div id="title">Fortune Cookie</div>
        <button id="back-btn">NEW COOKIE</button>
    </div>

    <div id="fortune-note">
        <h2 id="fortune-text">THE JOURNEY OF A THOUSAND MILES BEGINS WITH A SINGLE STEP.</h2>
        <p id="fortune-subtext">Acknowledge your progress, no matter how small.</p>
    </div>

    <audio id="crack-sound" preload="auto">
        <source src="https://www.soundjay.com/misc/sounds/crunch-01.mp3" type="audio/mpeg">
    </audio>

    <script>
        const { Engine, Render, Runner, Bodies, Composite, Mouse, MouseConstraint, Events, Vector, Body } = Matter;
        const engine = Engine.create();
        let width = window.innerWidth, height = window.innerHeight;
        
        const render = Render.create({
            element: document.body, engine: engine,
            options: { width, height, wireframes: false, background: 'transparent' }
        });
        Render.run(render);
        const runner = Runner.create();
        Runner.run(runner, engine);

        window.addEventListener('resize', () => {
            width = window.innerWidth; height = window.innerHeight;
            render.canvas.width = width; render.canvas.height = height;
            updateBoundaries();
        });

        const cookieBase = '#eebf87', cookieBack = '#d5a672', strokeColor = '#4e342e';
        const fortunes = [
            { main: "SUCCESS IS NOT FINAL, FAILURE IS NOT FATAL.", sub: "IT IS THE COURAGE TO CONTINUE THAT COUNTS." },
            { main: "THE BEST WAY TO PREDICT THE FUTURE IS TO CREATE IT.", sub: "YOUR ACTIONS TODAY DEFINE YOUR TOMORROW." },
            { main: "DON'T BE AFRAID TO GIVE UP THE GOOD FOR THE GREAT.", sub: "BIG RISKS OFTEN LEAD TO BIGGER REWARDS." },
            { main: "BELIEVE YOU CAN AND YOU'RE HALFWAY THERE.", sub: "CONFIDENCE IS THE PRIMARY KEY TO PROGRESS." },
            { main: "EVERY MOMENT IS A FRESH BEGINNING.", sub: "TAKE A DEEP BREATH AND START ANEW." }
        ];

        function generateTexture(type) {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            if (type === 'intact') {
                canvas.width = 400; canvas.height = 400;
                ctx.save(); ctx.translate(200, 200);
                ctx.save(); ctx.translate(-82, 30); ctx.rotate(-0.35); 
                ctx.fillStyle = '#fffef2'; ctx.strokeStyle = strokeColor; ctx.lineWidth = 1.2;
                ctx.fillRect(0, 0, 35, 15); ctx.strokeRect(0, 0, 35, 15); ctx.restore();
                ctx.fillStyle = cookieBack; ctx.beginPath();
                ctx.moveTo(-115, 80); ctx.bezierCurveTo(-150, -140, 150, -140, 115, 80); ctx.bezierCurveTo(40, 20, -40, 20, -115, 80); ctx.fill();
                ctx.fillStyle = cookieBase; ctx.strokeStyle = strokeColor; ctx.lineWidth = 4;
                ctx.beginPath(); ctx.moveTo(-110, 75); ctx.bezierCurveTo(-140, -130, 140, -130, 110, 75); ctx.bezierCurveTo(40, 15, -40, 15, -110, 75); ctx.fill(); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(-110, 75); ctx.bezierCurveTo(-40, 15, 40, 15, 110, 75); ctx.stroke();
                ctx.fillStyle = 'rgba(78, 52, 46, 0.25)';
                for(let i=0; i<12; i++) { ctx.beginPath(); ctx.arc(Math.random()*100-50, Math.random()*80-30, Math.random()*3+1.5, 0, Math.PI*2); ctx.fill(); }
                ctx.restore();
            } else {
                canvas.width = 800; canvas.height = 450;
                ctx.save(); ctx.translate(400, 225);
                const drawHalf = (side) => {
                    ctx.save(); ctx.scale(side, 1); ctx.translate(280, 0); 
                    ctx.fillStyle = cookieBack; ctx.beginPath(); ctx.moveTo(0, -100); ctx.bezierCurveTo(130, -110, 150, 80, 5, 135); ctx.lineTo(18, 135); ctx.bezierCurveTo(165, 80, 145, -110, 12, -100); ctx.fill();
                    ctx.fillStyle = cookieBase; ctx.strokeStyle = strokeColor; ctx.lineWidth = 4.5;
                    ctx.beginPath(); ctx.moveTo(0, -100); ctx.bezierCurveTo(130, -110, 150, 80, 5, 135); ctx.bezierCurveTo(-35, 80, -35, -60, 0, -100); ctx.fill(); ctx.stroke(); ctx.restore();
                };
                drawHalf(1); drawHalf(-1); ctx.restore();
            }
            return canvas.toDataURL();
        }

        const intactTex = generateTexture('intact'), crackedTex = generateTexture('cracked');
        let cookies = [], selected = null, walls = [];

        function updateBoundaries() {
            if (walls.length) Composite.remove(engine.world, walls);
            walls = [
                Bodies.rectangle(width/2, -50, width, 100, { isStatic: true, render: {visible: false} }),
                Bodies.rectangle(width/2, height+50, width, 100, { isStatic: true, render: {visible: false} }),
                Bodies.rectangle(-50, height/2, 100, height, { isStatic: true, render: {visible: false} }),
                Bodies.rectangle(width+50, height/2, 100, height, { isStatic: true, render: {visible: false} })
            ];
            Composite.add(engine.world, walls);
        }

        function spawn() {
            cookies = []; const count = width < 600 ? 12 : 24; 
            for (let i = 0; i < count; i++) {
                const c = Bodies.rectangle(Math.random() * width, Math.random() * height, 110, 100, {
                    restitution: 0.8, frictionAir: 0.02,
                    render: { sprite: { texture: intactTex, xScale: 0.5, yScale: 0.5 } }
                });
                cookies.push(c);
            }
            Composite.add(engine.world, cookies);
        }

        updateBoundaries(); spawn();

        const mouse = Mouse.create(render.canvas);
        const mc = MouseConstraint.create(engine, { mouse, constraint: { stiffness: 0.1, render: { visible: false } } });
        Composite.add(engine.world, mc);

        Events.on(mc, "mousedown", (e) => {
            const body = e.source.body;
            if (body && cookies.includes(body) && !selected) {
                selected = body; focus(body);
            }
        });

        function focus(target) {
            gsap.to('#title', { opacity: 0 });
            cookies.forEach(c => { if (c !== target) gsap.to(c.render, { opacity: 0, duration: 0.3, onComplete: () => Composite.remove(engine.world, c) }); });
            target.isStatic = true;
            // 确保碎裂过程居中展示 [cite: 21-02-2026]
            gsap.to(target.position, { x: width/2, y: height/2, duration: 1, ease: "power3.out" });
            gsap.to(target, { angle: 0, duration: 1, onComplete: () => {
                window.addEventListener('mousedown', startRitual, { once: true });
            }});
        }

        function startRitual() {
            const tl = gsap.timeline({ onComplete: crack });
            tl.to(selected.position, { x: "+=6", duration: 0.04, repeat: 15, yoyo: true, ease: "none" });
            gsap.to(render.canvas, { filter: "drop-shadow(0 0 25px rgba(229, 194, 152, 0.7)) brightness(1.15)", duration: 0.6, yoyo: true, repeat: 1 });
        }

        function crack() {
            const audio = document.getElementById('crack-sound');
            audio.currentTime = 0; audio.play().catch(()=>{});
            gsap.to(render.canvas, { filter: "none", duration: 0.2 });
            selected.render.sprite.texture = crackedTex; 
            selected.render.sprite.xScale = width < 600 ? 0.6 : 0.8;

            const randomFortune = fortunes[Math.floor(Math.random() * fortunes.length)];
            document.getElementById('fortune-text').innerText = randomFortune.main;
            document.getElementById('fortune-subtext').innerText = randomFortune.sub;

            const crumbs = [];
            for(let i=0; i<35; i++) {
                const p = Bodies.circle(width/2, height/2, 4, {
                    restitution: 0.4,
                    render: { sprite: { texture: intactTex, xScale: 0.05, yScale: 0.05, opacity: 0.6 } } 
                });
                Body.setVelocity(p, { x: (Math.random() - 0.5) * 18, y: (Math.random() - 0.8) * 24 });
                crumbs.push(p);
            }
            Composite.add(engine.world, crumbs);

            const note = document.getElementById('fortune-note');
            note.style.display = 'block';
            gsap.fromTo(note, 
                { y: 150, scale: 0.05, opacity: 0, rotation: -10 }, 
                { y: 0, scale: 1, opacity: 1, rotation: (Math.random() * 4 - 2), duration: 1.2, ease: "back.out(1.4)" }
            );
            document.getElementById('back-btn').style.display = 'block';
        }

        document.getElementById('back-btn').onclick = () => location.reload();
    </script>
</body>
</html>
